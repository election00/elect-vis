<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <title>US Election Results Visualization</title>
    <style>
      body {
        background-color: #111;
        color: #eee;
      }
      svg text {
        fill: #eee;
      }
      #grid-container {
        display: grid;
        /* Match the top balance bar geometry in p3.js:
           bar starts at 1/7 of the width and ends at 6.5/7. */
        grid-template-columns: 1fr 3fr 2.5fr 0.5fr;
        grid-template-rows: 110px 390px 115px;
        gap: 16px 0px;
        padding-bottom: 0;
        grid-template-areas:
          'bal bal bal bal'
          '. map scat .'
          '. time mode .';
        align-items: center;
        justify-items: center;
      }
      #cell-balance {
        grid-area: bal;
        width: 100%;
        height: 100%;
      }
      #cell-us-map {
        grid-area: map;
        justify-self: start;
        align-self: start;
        transform: translate(-52px, 6px);
      }
      #cell-scatter {
        grid-area: scat;
        justify-self: end;
        align-self: start;
        transform: translateY(6px);
      }
      #cell-timeline {
        grid-area: time;
        justify-self: start;
        align-self: start;
        transform: translate(0px, 12px);
      }
      #cell-mode {
        grid-area: mode;
        justify-self: end;
        align-self: start;
      }
      .stateHex {
        stroke-width: 0;
      }
      .stateHexOutline {
        stroke-width: 0;
        pointer-events: none;
      }
      .stateID {
        font-size: 12px;
        font-family: sans-serif;
        text-anchor: middle;
        dominant-baseline: middle;
        text-shadow: -1px -1px 3px #000, 0px -1px 3px #000, 1px -1px 3px #000, -1px 0px 3px #000,
          1px 0px 3px #000, -1px 1px 3px #000, 0px 1px 3px #000, 1px 1px 3px #000;
        pointer-events: none;
        opacity: 0.85;
      }
      .stateScat {
        stroke: white;
        stroke-opacity: 0.8;
        stroke-width: 1.3;
        fill: black;
        fill-opacity: 0.1;
      }
      #cell-balance text,
      #scat-axes text,
      #mode-form,
      #timeline-label {
        font-size: 16px;
        font-family: sans-serif;
        text-anchor: middle;
      }
      #cell-balance text {
        font-size: 18px;
        dominant-baseline: middle;
      }
      #y-axis {
        dominant-baseline: text-bottom;
      }
      #x-axis {
        dominant-baseline: hanging;
      }
      #scat-canvas {
        outline: #888 solid 1px;
      }


      /* Timeline control: label above slider with election-year ticks */
      #cell-timeline {
        --timeline-color: #ffffff;
      }
      #timeline-form {
        --thumb-size: 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 30em;
        padding: 8px 0;
        border-radius: 10px;
        box-sizing: border-box;
      }
      #timeline-label {
        text-align: center !important;
        line-height: 1.1;
        color: var(--timeline-color);
        transition: color 140ms ease;
      }
      #timeline-wrap {
        position: relative;
        width: 100%;
        height: 52px;
        --progress: 100%;
        overflow: visible;
      }
      /* custom flat slider line; endpoints match the first/last tick centers */
      #timeline-wrap::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 13px;
        height: 4px;
        background: var(--timeline-color);
        border-radius: 0;
        pointer-events: none;
        transition: background 140ms ease;
      }
      #timeline {
        position: absolute;
        left: calc(var(--thumb-size) / -2);
        right: calc(var(--thumb-size) / -2);
        top: -10px;
        width: calc(100% + var(--thumb-size)) !important;
        height: calc(var(--thumb-size) + 28px);
        cursor: pointer;
        opacity: 0;
        margin: 0;
        display: block;
        z-index: 3;
      }
      #timeline-knob {
        position: absolute;
        left: var(--progress);
        top: 15px;
        width: var(--thumb-size);
        height: var(--thumb-size);
        border-radius: 50%;
        background: var(--timeline-color);
        transform: translate(-50%, -50%);
        transition: background 140ms ease;
        pointer-events: none;
        z-index: 1;
      }
      #timeline-ticks {
        position: absolute;
        left: 0;
        right: 0;
        top: 13px;
        height: 34px;
        color: var(--timeline-color);
        font-family: sans-serif;
        font-size: 12px;
        pointer-events: none;
        transition: color 140ms ease;
      }
      .year-tick {
        position: absolute;
        left: var(--pos);
        top: 0;
        width: 0;
        height: 34px;
        text-align: center;
      }
      .year-tick::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        width: 2px;
        height: 14px;
        transform: translateX(-50%);
        background: currentColor;
      }
      .year-tick.show-label::after {
        content: attr(data-label);
        position: absolute;
        left: 0;
        top: 16px;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      /* Graph mode control: button-style radio options */
      #cell-mode {
        --mode-color: #ffffff;
        --mode-selected-bg: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      #mode-title {
        width: 100%;
        max-width: 30em;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--mode-color);
        color: var(--mode-color);
        text-align: center;
        font-size: 16px;
        font-family: sans-serif;
        transition: color 140ms ease, border-color 140ms ease;
      }
      #mode-form {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      #mode-form span {
        display: inline-flex;
        align-items: center;
      }
      #mode-form input[type='radio'] {
        position: absolute;
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }
      #mode-form label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 6px 16px;
        border: 1px solid var(--mode-color);
        border-radius: 999px;
        background: transparent;
        color: var(--mode-color);
        line-height: 1.1;
        cursor: pointer;
        user-select: none;
        transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
      }
            #mode-form input[type='radio']:checked + label {
        background: var(--mode-selected-bg);
        border-color: var(--mode-selected-bg);
        color: #111111;
      }
            #mode-form input[type='radio']:focus-visible + label {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }

      .hide {
        visibility: hidden;
      }
      .tooltip 
      {
        position: absolute;
        pointer-events: none;
      };
    </style>
  </head>
  <body>
    <div id="thevis" class="hide">
      <div id="grid-container">
        <div id="cell-balance"></div>
        <div id="cell-us-map"><svg id="us-map"></svg></div>
        <div id="cell-scatter" style="position: relative">
          <canvas id="scat-canvas"></canvas>
          <svg id="scat-axes" style="position: absolute">
            <text id="y-axis">#y-axis</text>
            <text id="x-axis">#x-axis</text>
          </svg>
          <svg id="scat-marks-container" style="position: absolute">
            <g id="scat-marks"></g>
          </svg>
        </div>
        <div id="cell-timeline">
          <form id="timeline-form">
            <label id="timeline-label" for="timeline">
              Election Year <span id="year">????</span>
            </label>
            <div id="timeline-wrap">
              <input type="range" min="0" max="0" id="timeline" name="year" />
              <div id="timeline-knob"></div>
              <div id="timeline-ticks"></div>
            </div>
          </form>
        </div>
        <div id="cell-mode">
          <div id="mode-title">Graph Mode</div>
          <form id="mode-form" name="mode-form"></form>
        </div>
      </div>
    </div>

    <script type="module">
      import { d3, parm, glob } from './common.js';
      import * as hex from './hexmap.js';
      import * as p3 from './p3.js';

      window.addEventListener('load', () => d3.select('#thevis').classed('hide', false));

      hex.mapResize('us-map', parm.hexWidth);
      p3.balanceInit('cell-balance', 'balance');
      p3.canvasInit('scat-canvas');
      p3.scatLabelPos();

      function keydownDo(evt) {
        switch (evt.key) {
          case 'd':
            glob.currentAbbrHide = !glob.currentAbbrHide;
            d3.selectAll('.stateID').classed('hide', glob.currentAbbrHide);
            break;
          default:
            break;
        }
      }

      Promise.all(
        ['votes', 'hexRC', 'candidateNames', 'stateNames'].map((fn) =>
          d3.csv(`./data/${fn}.csv`).then((data) => (glob.csvData[fn] = data))
        )
      ).then(() => {
        hex.mapFill(
          'us-map',
          glob.csvData.hexRC.map((d) =>
            hex.gen(parm.hexWidth, parm.hexScale, d.StateAbbr, +d.row, +d.col)
          )
        );
        p3.scatMarksInit('scat-marks', glob.csvData.votes);
        p3.dataProc(glob);
        p3.visInit(glob);
        p3.formsInit('timeline', 'year', glob.years, 'mode-form');

        let initialShowData = true;
        const initialYear = glob.years.slice(-1);
        const initialMode = 'RVD';
        if (initialShowData) {
          document.getElementById('timeline-form').year.value = initialYear;
          document.getElementById('timeline').click();
          document.getElementById(initialMode).click();
        }
        document.addEventListener('keydown', keydownDo);
      });
    </script>
  </body>
</html>
